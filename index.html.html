<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDU-IKH Invoice System - Login</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Load Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Configure Babel Standalone to use classic runtime for React -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
    <!-- Load html2canvas for Image Generation -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- Google Fonts: Inter for English, Battambang for Khmer fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Font Stack */
        body, #root, input, textarea, button, div, span, p, h1, h2, h3, h4, td, th {
            font-family: 'Inter', 'Battambang', sans-serif !important;
        }
        
        /* Custom Inputs to look seamless */
        .invoice-input:focus, .editable-div:focus, .invoice-textarea:focus {
            outline: 2px solid #6366f1; /* Indigo focus */
            background-color: #eef2ff !important; /* Light indigo bg */
            border-radius: 4px;
        }

        /* Custom Date Picker Styling */
        .date-input-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .hidden-date-picker {
            position: absolute;
            opacity: 0;
            right: 0;
            top: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body * {
                visibility: hidden;
            }
            
            #root, #root * {
                visibility: visible;
            }
            
            #root {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            
            .print-container {
                width: 210mm !important;
                min-height: 297mm !important;
                position: absolute;
                top: 0;
                left: 0;
                margin: 0 !important;
                padding: 10mm !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                font-size: 11pt;
            }

            table, tr, td, th, .break-avoid {
                page-break-inside: avoid;
            }

            .no-print {
                display: none !important;
            }
            
            .invoice-input, .editable-div, .invoice-textarea {
                border: none !important;
                background: transparent !important;
                resize: none;
            }
            
            .calendar-icon {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel" data-presets="env,react-classic">
    const { useState, useEffect, useRef } = React;

    // ជំនួស URL នេះជាមួយនឹង Web App URL របស់លោកគ្រូដែលបានមកពី Google Apps Script
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5IpuygMm8vw2g2P9a8qqHFYNpft4UFtW1YpIpSlaM8xYFtksSbtZ0uKPnZFARQrls/exec"; 

    // Icons Components (SVG)
    const PrinterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const ImageIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2Icon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400 calendar-icon ml-1 min-w-[14px]"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const DatabaseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>;
    const FilePlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>;
    const LockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const LogOutIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;

    // -----------------------------------------------------
    // ១. កម្មវិធីសម្រាប់ Login (Login Screen)
    // -----------------------------------------------------
    const LoginScreen = ({ onLoginSuccess }) => {
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');

        const handleLogin = (e) => {
            e.preventDefault();
            // លោកគ្រូអាចប្តូរ Username និង Password នៅទីនេះបាន
            const CORRECT_USER = "admin";
            const CORRECT_PASS = "12345";

            if (username === CORRECT_USER && password === CORRECT_PASS) {
                setError('');
                onLoginSuccess();
            } else {
                setError('Username ឬ Password មិនត្រឹមត្រូវទេ!');
            }
        };

        return (
            <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 to-blue-100 p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
                    <div className="text-center mb-8">
                        <div className="bg-indigo-600 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                            <LockIcon />
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800">EDU-IKH INVOICE</h2>
                        <p className="text-gray-500 mt-2 text-sm">សូមវាយបញ្ចូលគណនីដើម្បីចូលប្រើប្រាស់</p>
                    </div>

                    <form onSubmit={handleLogin} className="space-y-5">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">ឈ្មោះអ្នកប្រើ (Username)</label>
                            <input 
                                type="text" 
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                                placeholder="បញ្ចូល username"
                                required
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">លេខសម្ងាត់ (Password)</label>
                            <input 
                                type="password" 
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                                placeholder="បញ្ចូលលេខសម្ងាត់"
                                required
                            />
                        </div>

                        {error && (
                            <div className="bg-red-50 text-red-600 text-sm p-3 rounded-lg text-center border border-red-100">
                                {error}
                            </div>
                        )}

                        <button 
                            type="submit" 
                            className="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition shadow-md hover:shadow-lg focus:ring-4 focus:ring-indigo-200"
                        >
                            ចូលប្រព័ន្ធ (Login)
                        </button>
                    </form>
                </div>
            </div>
        );
    };

    // -----------------------------------------------------
    // ២. កម្មវិធីបង្កើតវិក្កយបត្រ (Invoice Generator)
    // -----------------------------------------------------
    const InvoiceGenerator = ({ onLogout }) => {
        const formatDateDDMMYYYY = (dateObj) => {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const y = dateObj.getFullYear();
            return `${d}-${m}-${y}`;
        };

        const [invoiceData, setInvoiceData] = useState({
            invoiceNumber: '',
            date: formatDateDDMMYYYY(new Date()),
            dueDate: formatDateDDMMYYYY(new Date()),
            validityStart: formatDateDDMMYYYY(new Date()),
            sellerName: 'Home School Service',
            sellerAddress: 'website: www.edu-ikh.com',
            sellerPhone: '096 96 40 573 | 069 333 481',
            sellerEmail: 'tutor@school.com',
            studentName: '',
            studentAddress: '',
            studentPhone: '',
            currency: '$',
            discountRate: 0,
            note: 'Thank you for choosing services and products from:\n EDU-IKH : HOME SCHOOL SERVICE. We are committed to your success!',
            paymentInfo: 'ABA Name : CHEANG SOKKONG\nAccount Number : 000 738 752',
            items: [
                { id: 1, description: 'Math-CSCA', startTime: '02:00', endTime: '03:00', quantity: 1, price: 150 },
            ],
        });

        const [subtotal, setSubtotal] = useState(0);
        const [discountAmount, setDiscountAmount] = useState(0);
        const [grandTotal, setGrandTotal] = useState(0);
        const [isGeneratingImage, setIsGeneratingImage] = useState(false);
        const [isSaving, setIsSaving] = useState(false);
        const [saveStatus, setSaveStatus] = useState(null); 

        useEffect(() => {
            let currentSeq = parseInt(localStorage.getItem('edu_ikh_invoice_seq_v2'));
            if (!currentSeq) {
                currentSeq = 1221; 
                localStorage.setItem('edu_ikh_invoice_seq_v2', 1221);
            }
            
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const seqString = String(currentSeq).padStart(5, '0'); 
            const randomId = Math.floor(1000 + Math.random() * 9000);

            setInvoiceData(prev => ({
                ...prev,
                invoiceNumber: `INV-${yyyy}-${mm}-${seqString}-${randomId}`
            }));
        }, []);

        const handleNewInvoice = () => {
            let currentSeq = parseInt(localStorage.getItem('edu_ikh_invoice_seq_v2')) || 1221; 
            currentSeq += 1;
            localStorage.setItem('edu_ikh_invoice_seq_v2', currentSeq);

            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const seqString = String(currentSeq).padStart(5, '0'); 
            const randomId = Math.floor(1000 + Math.random() * 9000);

            setInvoiceData(prev => ({
                ...prev,
                invoiceNumber: `INV-${yyyy}-${mm}-${seqString}-${randomId}`,
                studentName: '',
                studentAddress: '',
                studentPhone: '',
                items: [
                    { id: Date.now(), description: 'Math-CSCA', startTime: '02:00', endTime: '03:00', quantity: 1, price: 150 },
                ]
            }));
        };

        useEffect(() => {
            const sub = invoiceData.items.reduce((acc, item) => acc + (item.quantity * item.price), 0);
            const discount = sub * (invoiceData.discountRate / 100);
            const total = sub - discount;

            setSubtotal(sub);
            setDiscountAmount(discount);
            setGrandTotal(total);
        }, [invoiceData]);

        const calculateDuration = (start, end) => {
            if (!start || !end || !start.includes(':') || !end.includes(':')) return 0;
            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            if (isNaN(startH) || isNaN(startM) || isNaN(endH) || isNaN(endM)) return 0;
            let diffInMinutes = (endH * 60 + endM) - (startH * 60 + startM);
            if (diffInMinutes < 0) diffInMinutes += 24 * 60; 
            return parseFloat((diffInMinutes / 60).toFixed(2));
        };

        const handleInputChange = (e) => {
            const { name, value } = e.target;
            setInvoiceData({ ...invoiceData, [name]: value });
        };

        const handleDatePick = (field, isoDateValue) => {
            if (!isoDateValue) return;
            const [y, m, d] = isoDateValue.split('-');
            const formatted = `${d}-${m}-${y}`;
            setInvoiceData({ ...invoiceData, [field]: formatted });
        };

        const handleItemChange = (id, field, value) => {
            const newItems = invoiceData.items.map((item) => {
                if (item.id === id) {
                    let updatedItem = { ...item, [field]: value };
                    
                    if (field === 'startTime' || field === 'endTime') {
                        const s = field === 'startTime' ? value : item.startTime;
                        const e = field === 'endTime' ? value : item.endTime;
                        const duration = calculateDuration(s, e);
                        if (duration > 0) {
                            updatedItem.quantity = duration;
                        }
                    }
                    
                    if (field === 'quantity' || field === 'price') {
                        updatedItem[field] = Number(value);
                    }
                    return updatedItem;
                }
                return item;
            });
            setInvoiceData({ ...invoiceData, items: newItems });
        };

        const addItem = () => {
            const newItem = { id: Date.now(), description: '', startTime: '', endTime: '', quantity: 0, price: 0 };
            setInvoiceData({ ...invoiceData, items: [...invoiceData.items, newItem] });
        };

        const removeItem = (id) => {
            const newItems = invoiceData.items.filter((item) => item.id !== id);
            setInvoiceData({ ...invoiceData, items: newItems });
        };

        const handlePrint = () => window.print();

        const handleDownloadImage = async () => {
            const element = document.querySelector('.print-container');
            if (!element) return;
            setIsGeneratingImage(true);

            try {
                await new Promise(resolve => setTimeout(resolve, 100));
                const canvas = await html2canvas(element, { scale: 2, useCORS: true, allowTaint: true, logging: false, backgroundColor: '#ffffff', windowWidth: 1400 });
                const image = canvas.toDataURL("image/jpeg", 0.9);
                const studentName = invoiceData.studentName ? invoiceData.studentName.trim() : 'Unknown_Student';
                const fileName = `${studentName}-${invoiceData.invoiceNumber}.jpg`;
                const link = document.createElement('a');
                link.href = image;
                link.download = fileName;
                link.click();
            } catch (error) {
                console.error("Error generating image:", error);
                alert("Cannot generate image. (Error: " + error.message + ")");
            } finally {
                setIsGeneratingImage(false);
            }
        };

        const handleSaveToDrive = async () => {
            if (GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE" || GOOGLE_SCRIPT_URL === "") {
                alert("សូមលោកគ្រូផ្លាស់ប្តូរ GOOGLE_SCRIPT_URL ទៅកាន់ Web App URL ពិតប្រាកដសិន។");
                return;
            }

            setIsSaving(true);
            setSaveStatus(null);
            const now = new Date();
            const realTimeStr = now.toLocaleDateString('en-GB') + ' ' + now.toLocaleTimeString('en-US');
            const subjectsStr = invoiceData.items.map(item => item.description || "N/A").join(", ");
            const timeInsStr = invoiceData.items.map(item => item.startTime || "N/A").join(", ");
            const timeOutsStr = invoiceData.items.map(item => item.endTime || "N/A").join(", ");

            const payload = {
                date: invoiceData.date, invoiceNumber: invoiceData.invoiceNumber, buyerName: invoiceData.studentName || "មិនបានបញ្ជាក់ឈ្មោះ",
                buyerPhone: invoiceData.studentPhone || "មិនបានបញ្ជាក់លេខទូរស័ព្ទ", buyerAddress: invoiceData.studentAddress || "មិនបានបញ្ជាក់ទីតាំង",
                subtotal: subtotal.toFixed(2), discountRate: invoiceData.discountRate, grandTotal: grandTotal.toFixed(2),
                realTime: realTimeStr, validityStart: invoiceData.validityStart, dueDate: invoiceData.dueDate,
                subjects: subjectsStr, timeIns: timeInsStr, timeOuts: timeOutsStr
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                setSaveStatus('success');
                setTimeout(() => setSaveStatus(null), 3000); 
            } catch (error) {
                console.error("Error saving data:", error);
                setSaveStatus('error');
            } finally {
                setIsSaving(false);
            }
        };

        return (
            <div className="min-h-screen bg-gray-50 p-4">
                {/* Control Bar (Top) */}
                <div className="no-print max-w-7xl mx-auto mb-6 flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                    <div className="flex items-center gap-4">
                        <h1 className="text-xl font-bold text-gray-800">Invoice Generator</h1>
                        {/* មុខងារចាកចេញ (Logout) */}
                        <button 
                            onClick={onLogout}
                            className="flex items-center gap-1 text-sm text-red-500 hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded transition"
                        >
                            <LogOutIcon /> ចាកចេញ
                        </button>
                    </div>

                    <div className="flex gap-3 items-center">
                        {saveStatus === 'success' && <span className="text-green-600 font-medium text-sm">ជោគជ័យ! ទិន្នន័យបានរក្សាទុក</span>}
                        {saveStatus === 'error' && <span className="text-red-600 font-medium text-sm">មានបញ្ហាក្នុងការរក្សាទុក</span>}
                        
                        <button onClick={handleNewInvoice} className="flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-md font-medium transition shadow-sm border border-blue-200">
                            <FilePlusIcon /> New Invoice
                        </button>

                        <button onClick={handleSaveToDrive} disabled={isSaving} className={`flex items-center gap-2 px-4 py-2 rounded-md font-medium transition text-white ${isSaving ? 'bg-green-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 shadow-sm'}`}>
                            <DatabaseIcon /> {isSaving ? 'Saving...' : 'Save to Sheets'}
                        </button>

                         <button onClick={handleDownloadImage} disabled={isGeneratingImage} className={`flex items-center gap-2 px-4 py-2 rounded-md font-medium transition ${isGeneratingImage ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}>
                            <ImageIcon /> {isGeneratingImage ? 'Generating...' : 'Save as Image'}
                        </button>
                        <button onClick={handlePrint} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-md font-medium hover:bg-indigo-700 transition shadow-sm">
                            <PrinterIcon /> Print / PDF
                        </button>
                    </div>
                </div>

                {/* Print Container (Invoice Paper) */}
                <div className="print-container max-w-7xl mx-auto bg-white shadow-lg p-8 min-h-[29.7cm] flex flex-col relative">
                    <div className="flex-grow">
                        {/* Header Area */}
                        <div className="flex justify-between items-start mb-8 border-b-2 border-indigo-100 pb-6">
                            <div className="w-[60%] pr-4">
                                <h2 className="text-4xl font-extrabold text-indigo-900 mb-3 tracking-tight">INVOICE</h2>
                                <div className="space-y-1 pl-3 border-l-4 border-indigo-500">
                                    <input type="text" value={invoiceData.sellerName} readOnly className="invoice-input w-full font-bold text-xl border-none focus:ring-0 bg-transparent rounded p-0 cursor-default select-none text-gray-800" />
                                    <div className="px-1 text-sm text-gray-600 font-medium">{invoiceData.sellerAddress}</div>
                                    <div className="px-1 text-sm text-gray-600 font-medium mt-1">Tel: {invoiceData.sellerPhone}</div>
                                </div>
                            </div>

                            <div className="w-[40%] text-right flex flex-col items-end">
                                <div className="bg-slate-50 p-5 rounded-lg w-full border border-slate-100">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-gray-500 font-bold text-xl font-semibold uppercase tracking-wider">Invoice No</span>
                                        <input type="text" value={invoiceData.invoiceNumber} readOnly className="invoice-input text-right font-bold text-gray-900 bg-transparent border-none focus:ring-0 p-0 w-64 cursor-default select-none" />
                                    </div>
                                    
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-gray-500 font-bold text-xl font-semibold uppercase tracking-wider">Date</span>
                                        <div className="date-input-container">
                                            <input type="text" value={invoiceData.date} onChange={(e) => setInvoiceData({...invoiceData, date: e.target.value})} className="invoice-input text-right font-bold text-gray-900 bg-transparent border-none focus:ring-0 p-0 w-64 cursor-default select-none" placeholder="dd-mm-yyyy" />
                                            <span data-html2canvas-ignore="true"><CalendarIcon /><input type="date" className="hidden-date-picker" onChange={(e) => handleDatePick('date', e.target.value)} /></span>
                                        </div>
                                    </div>

                                    {/* Validity Range */}
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-500 font-bold text-xl font-semibold uppercase tracking-wider mr-1">Validity</span>
                                        <div className="flex items-center justify-end w-full">
                                            <div className="date-input-container w-32">
                                                <input type="text" value={invoiceData.validityStart} onChange={(e) => setInvoiceData({...invoiceData, validityStart: e.target.value})} className="invoice-input text-right font-bold text-gray-900 bg-transparent border-none focus:ring-0 p-0 w-64 cursor-default select-none" placeholder="dd-mm-yyyy" />
                                                <span data-html2canvas-ignore="true"><CalendarIcon /><input type="date" className="hidden-date-picker" onChange={(e) => handleDatePick('validityStart', e.target.value)} /></span>
                                            </div>
                                            <span className="text-xs text-gray-400 mx-1 font-medium">  &#8680;</span>
                                            <div className="date-input-container w-32">
                                                <input type="text" value={invoiceData.dueDate} onChange={(e) => setInvoiceData({...invoiceData, dueDate: e.target.value})} className="invoice-input text-right font-bold text-gray-900 bg-transparent border-none focus:ring-0 p-0 w-64 cursor-default select-none" placeholder="dd-mm-yyyy" />
                                                <span data-html2canvas-ignore="true"><CalendarIcon /><input type="date" className="hidden-date-picker" onChange={(e) => handleDatePick('dueDate', e.target.value)} /></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Student Info */}
                        <div className="mb-8 flex">
                            <div className="w-full bg-slate-50/50 rounded-lg border border-slate-200 p-5">
                                <h3 className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Student Info</h3>
                                <div className="flex flex-col">
                                    <input type="text" name="studentName" value={invoiceData.studentName} onChange={handleInputChange} className="invoice-input w-full font-bold text-2xl bg-transparent border-none focus:ring-0 rounded-none p-3 mb-1 text-gray-900 placeholder-gray-300" placeholder="Student Name" />
                                    <input name="studentAddress" value={invoiceData.studentAddress} onChange={handleInputChange} className="invoice-input w-full font-bold text-2xl bg-transparent border-none focus:ring-0 rounded-none p-2 mb-1 text-gray-900 placeholder-gray-300" placeholder="Student Location" />
                                    <input type="text" name="studentPhone" value={invoiceData.studentPhone} onChange={handleInputChange} className="invoice-input w-full font-bold text-2xl bg-transparent border-none focus:ring-0 rounded-none p-2 mb-1 text-gray-900 placeholder-gray-300" placeholder="Phone Number" />
                                </div>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="mb-8">
                            <div className="rounded-lg border border-slate-200 overflow-hidden">
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr className="bg-slate-800 text-white text-xs font-bold uppercase tracking-wider">
                                            <th className="py-3 px-4 text-left border-r border-slate-700">Description / Subject</th>
                                            <th className="py-3 px-2 text-center border-r border-slate-700 w-24">Time In</th>
                                            <th className="py-3 px-2 text-center border-r border-slate-700 w-24">Time Out</th>
                                            <th className="py-3 px-2 text-center border-r border-slate-700 w-16">QTY</th>
                                            <th className="py-3 px-4 text-right border-r border-slate-700">Unit Price / Month</th>
                                            <th className="py-3 px-4 text-right">Amount</th>
                                            <th className="py-3 px-2 w-10 no-print text-center bg-slate-800 border-l border-slate-700" data-html2canvas-ignore="true"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200 border-b border-slate-200">
                                        {invoiceData.items.map((item, index) => (
                                            <tr key={item.id} className={`hover:bg-indigo-50/30 transition group ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'}`}>
                                                <td className="p-2 pl-4 border-r border-slate-200"><input type="text" value={item.description} onChange={(e) => handleItemChange(item.id, 'description', e.target.value)} className="invoice-input w-full font-bold text-2xl bg-transparent border-none focus:ring-0 rounded-none p-3 mb-1 text-gray-900 placeholder-gray-300" placeholder="Subject description" /></td>
                                                <td className="p-2 pl-4 border-r border-slate-200"><input type="text" value={item.startTime} onChange={(e) => handleItemChange(item.id, 'startTime', e.target.value)} className="invoice-input w-full font-bold text-xl bg-transparent border-none focus:ring-2 focus:ring-indigo-100 rounded p-1 font-medium text-gray-700 placeholder-gray-300" placeholder="In" /></td>
                                                <td className="p-2 pl-4 border-r border-slate-200"><input type="text" value={item.endTime} onChange={(e) => handleItemChange(item.id, 'endTime', e.target.value)} className="invoice-input w-full font-bold text-xl bg-transparent border-none focus:ring-2 focus:ring-indigo-100 rounded p-1 font-medium text-gray-700 placeholder-gray-300" placeholder="Out" /></td>
                                                <td className="p-2 border-r border-slate-200"><input type="number" value={item.quantity} onChange={(e) => handleItemChange(item.id, 'quantity', e.target.value)} className="invoice-input w-full font-bold text-xl bg-transparent border-none focus:ring-2 focus:ring-indigo-100 rounded p-1 font-medium text-gray-700 placeholder-gray-300" min="0" step="0.1" /></td>
                                                <td className="p-2 border-r border-slate-200"><input type="number" value={item.price} onChange={(e) => handleItemChange(item.id, 'price', e.target.value)} className="invoice-input w-full font-bold text-xl text-right bg-transparent border-none focus:ring-2 focus:ring-indigo-100 rounded p-1 font-medium text-gray-700" min="0" /></td>
                                                <td className="text-right font-bold text-xl text-gray-900">{invoiceData.currency} {(item.quantity * item.price).toFixed(2)}</td>
                                                <td className="p-1 text-center no-print border-l border-slate-200" data-html2canvas-ignore="true">
                                                    <button onClick={() => removeItem(item.id)} className="text-gray-300 hover:text-red-500 p-2 rounded-full transition opacity-0 group-hover:opacity-100" title="Remove"><Trash2Icon /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <button onClick={addItem} className="mt-[5mm] no-print flex items-center gap-2 text-indigo-600 font-semibold text-sm px-4 py-2 rounded-md hover:bg-indigo-50 transition border border-dashed border-indigo-200" data-html2canvas-ignore="true">
                                <PlusIcon /> Add Item
                            </button>
                        </div>

                        {/* Totals Section */}
                        <div className="flex justify-end mt-12">
                            <div className="w-1/2 bg-indigo-900 text-white p-8 rounded-lg shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16"></div>
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16"></div>
                                <div className="flex justify-between text-white border-b border-slate-200 pb-3">
                                    <span className="font-medium text-sm">Subtotal</span>
                                    <span className="font-semibold text-white">{invoiceData.currency} {subtotal.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between items-center text-gray-600 border-b border-slate-200 pb-3">
                                    <div className="flex items-center gap-3">
                                        <span className="font-medium text-sm text-white">Discount</span>
                                        <div className="flex items-center text-white no-print border-gray-300 rounded p px-2 py-0.5 shadow-sm">
                                            <input type="number" name="discountRate" value={invoiceData.discountRate} onChange={handleInputChange} className="invoice-input w-full bg-transparent border-none focus:ring-2 focus:ring-indigo-100 rounded p-1 font-medium text-red-500 placeholder-gray-900" min="0" max="100" />
                                            <span className="text-xs text-white">%</span>
                                        </div>
                                        <span className="print-only hidden text-sm font-medium text-white">({invoiceData.discountRate}%)</span>
                                    </div>
                                    <span className="font-semibold text-red-500">-{invoiceData.currency} {discountAmount.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-5xl font-bold text-white pt-1">
                                    <span>Total</span>
                                    <span>{invoiceData.currency} {grandTotal.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="mt-12 break-avoid">
                        <div className="grid grid-cols-2 gap-8">
                            <div>
                                <h4 className="font-bold text-gray-700 text-xs uppercase tracking-wider mb-2">Thank You For choosing</h4>
                                <div contentEditable suppressContentEditableWarning onBlur={(e) => setInvoiceData({ ...invoiceData, note: e.currentTarget.innerText })} className="editable-div w-full min-h-[140px] bg-yellow-100 border border-yellow-800 rounded-lg p-4 text-sm text-gray-600 focus:ring-1 focus:ring-yellow-300 whitespace-pre-wrap font-bold cursor-text">
                                    {invoiceData.note}
                                </div>
                            </div>
                            <div>
                                <h4 className="font-bold text-gray-700 text-xs uppercase tracking-wider mb-2">Bank Transfer Info</h4>
                                <div contentEditable suppressContentEditableWarning onBlur={(e) => setInvoiceData({ ...invoiceData, paymentInfo: e.currentTarget.innerText })} className="editable-div w-full min-h-[140px] bg-indigo-100 border border-indigo-800 rounded-lg p-4 text-sm text-gray-600 focus:ring-1 focus:ring-indigo-300 whitespace-pre-wrap cursor-text font-bold font-mono">
                                    {invoiceData.paymentInfo}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // -----------------------------------------------------
    // ៣. កម្មវិធីគោល (Main App) - សម្រាប់គ្រប់គ្រងការបិទបើកទំព័រ
    // -----------------------------------------------------
    const App = () => {
        const [isLoggedIn, setIsLoggedIn] = useState(false);

        // មុខងារចងចាំការ Login (ដើម្បីកុំឱ្យវាទារ Password ម្ដងទៀតពេល Refresh ទំព័រ)
        useEffect(() => {
            const sessionStatus = sessionStorage.getItem('edu_ikh_logged_in');
            if (sessionStatus === 'true') {
                setIsLoggedIn(true);
            }
        }, []);

        const handleLoginSuccess = () => {
            setIsLoggedIn(true);
            sessionStorage.setItem('edu_ikh_logged_in', 'true');
        };

        const handleLogout = () => {
            setIsLoggedIn(false);
            sessionStorage.removeItem('edu_ikh_logged_in');
        };

        return (
            <div>
                {isLoggedIn ? (
                    <InvoiceGenerator onLogout={handleLogout} />
                ) : (
                    <LoginScreen onLoginSuccess={handleLoginSuccess} />
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
